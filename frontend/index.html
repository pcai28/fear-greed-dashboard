<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Track CNN Fear & Greed Index and VIX together in one live market sentiment dashboard with dual-axis charts, gauges, and historical views."
    />
    <meta property="og:title" content="Market Fear Dashboard | Fear & Greed + VIX" />
    <meta
      property="og:description"
      content="Compare CNN Fear & Greed Index and VIX on one live dashboard with gauges, dual-axis charts, and market sentiment reference tables."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/favicon.svg" />
    <title>Market Fear Dashboard | Fear &amp; Greed + VIX</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script src="/src/theme-boot.js" type="module"></script>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="topbar-copy">
          <p class="eyebrow">US Stock Market Emotions</p>
          <h1>CNN Fear &amp; Greed Index / VIX</h1>
        </div>
        <div class="topbar-meta">
          <div class="top-actions">
            <a class="alerts-link" href="#waitlistForm">Get alerts</a>
            <button
              class="theme-toggle"
              id="themeToggle"
              type="button"
              aria-label="Theme: auto, matching your system. Click to switch to light mode."
              title="Theme: auto (matches system)"
            >
              <svg class="theme-icon theme-icon-auto" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
                <circle cx="12" cy="12" r="9"></circle>
                <path d="M12 3a9 9 0 0 1 0 18z" fill="currentColor" stroke="none"></path>
              </svg>
              <svg class="theme-icon theme-icon-light" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
                <circle cx="12" cy="12" r="4.5"></circle>
                <path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
              </svg>
              <svg class="theme-icon theme-icon-dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
                <path d="M21 14.5A8.5 8.5 0 0 1 9.5 3a7 7 0 1 0 11.5 11.5z"></path>
              </svg>
            </button>
          </div>
          <div class="updated" id="updatedAt">Loading live data...</div>
        </div>
      </header>

      <!-- @include:views/gauges.html -->
      <!-- @include:views/chart.html -->
      <!-- @include:views/reference.html -->
      <!-- @include:views/footer.html -->
      <!-- @include:views/share.html -->
    </main>

    <script src="/src/main.js" type="module"></script>
  </body>
</html>
